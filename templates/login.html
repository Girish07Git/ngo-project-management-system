<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · NGO System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #198754);
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Decorative tree silhouettes in background */
    body::before,
    body::after {
      content: '🌳';
      position: absolute;
      font-size: 120px;
      opacity: 0.08;
      bottom: -20px;
      pointer-events: none;
    }
    body::before {
      left: -20px;
      transform: rotate(-10deg);
    }
    body::after {
      right: -20px;
      transform: rotate(10deg) scaleX(-1);
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 2.2rem 2rem 2rem;
      border-radius: 32px;
      background: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideUp 0.7s ease forwards;
      transition: transform 0.2s;
      position: relative;
      z-index: 1;
    }

    /* Tree icon decoration on card */
    .card::before {
      content: '🌿';
      position: absolute;
      top: -18px;
      right: 20px;
      font-size: 36px;
      opacity: 0.3;
      transform: rotate(15deg);
    }

    @keyframes slideUp {
      0% {
        opacity: 0;
        transform: translateY(50px) scale(0.97);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card h2 {
      font-weight: 600;
      color: #0d2b3e;
      letter-spacing: -0.3px;
      margin-bottom: 1.8rem;
    }
    .card h2 i {
      color: #0d6efd;
      margin-right: 6px;
    }

    .form-control {
      border-radius: 14px;
      padding: 0.7rem 1rem;
      border: 1px solid #d6dee7;
      background: #fafcff;
      transition: 0.15s;
      font-size: 0.98rem;
      height: 50px;
    }
    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.15);
      background: white;
    }
    .form-control::placeholder {
      color: #96a7b9;
      font-weight: 400;
    }

    .btn-primary {
      border-radius: 40px;
      padding: 0.7rem 1.2rem;
      font-weight: 500;
      background: #0d6efd;
      border: none;
      transition: all 0.15s;
      letter-spacing: 0.3px;
      font-size: 1.05rem;
      height: 52px;
    }
    .btn-primary:hover {
      background: #0b5ed7;
      transform: scale(1.01);
      box-shadow: 0 8px 22px -8px #0d6efdcc;
    }
    .btn-primary i {
      margin-right: 8px;
    }

    .login-links {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #2c3e50;
    }
    .login-links a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 500;
      transition: 0.12s;
    }
    .login-links a:hover {
      color: #0a58ca;
      text-decoration: underline;
    }
    .forgot-link {
      display: inline-block;
      margin-bottom: 0.6rem;
    }

    /* Decorative tree branch line */
    .tree-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 1.2rem 0 0.8rem;
      color: #b8c9da;
      font-size: 0.85rem;
    }
    .tree-divider::before,
    .tree-divider::after {
      content: '🌱';
      font-size: 16px;
      opacity: 0.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.8rem 1.2rem;
      }
      .card h2 {
        font-size: 1.7rem;
      }
      body::before,
      body::after {
        font-size: 80px;
      }
    }
  </style>
</head>
<body>

<div class="card shadow-lg">

  <h2 class="text-center">
    <i class="fas fa-lock"></i> Login
  </h2>

  <form method="POST" action="/login">

    <div class="mb-3">
      <input
        type="email"
        name="email"
        class="form-control"
        placeholder="🌳 Email address"
        required
        autofocus
      >
    </div>

    <div class="mb-3">
      <input
        type="password"
        name="password"
        class="form-control"
        placeholder="🌿 Password"
        required
      >
    </div>

    <button type="submit" class="btn btn-primary w-100">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </form>

  <!-- Tree divider -->
  <div class="tree-divider">
    <span>🌲</span>
    <span style="flex:1; height:1px; background: linear-gradient(to right, transparent, #b8c9da, transparent);"></span>
    <span>🌲</span>
  </div>

  <div class="login-links text-center">

    <div class="forgot-link">
      <a href="/forgot-password">
        <i class="fas fa-key me-1"></i> Forgot Password?
      </a>
    </div>

    <div>
      <span style="color: #4b5e71;">Don't have an account?</span>
      <a href="/register" class="ms-1">
        <i class="fas fa-user-plus me-1"></i> Register
      </a>
    </div>

    <div class="mt-3 small">
      <a href="/" style="color: #7f8fa4; text-decoration: none;">
        <i class="fas fa-arrow-left me-1"></i> Back to home
      </a>
    </div>
  </div>

</div> 

</body>
</html>
